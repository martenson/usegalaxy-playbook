language: python
env:
  - GALAXY_VERSION=release_19.05
  - GALAXY_SKIP_CLIENT_BUILD=1
script:
  - cd ${TRAVIS_BUILD_DIR}
  - wget https://github.com/galaxyproject/galaxy/archive/${GALAXY_VERSION}.tar.gz
  - tar xvzf ${GALAXY_VERSION}.tar.gz | tail
  - cd galaxy-${GALAXY_VERSION}
  - GALAXY_DIR=$PWD
  - sh scripts/common_startup.sh
  - cd ${TRAVIS_BUILD_DIR}
  - wget https://github.com/galaxyproject/usegalaxy-playbook/archive/master.tar.gz
  - tar xvzf master.tar.gz | tail
  - cd usegalaxy-playbook-master
  - PLAYBOOK_DIR=$PWD
  - cd ${TRAVIS_BUILD_DIR}
  - mv ${GALAXY_DIR}/lib ${PLAYBOOK_DIR}/env/common/files/galaxy/dynamic_rules/
  - cd ${TRAVIS_BUILD_DIR}
  - source ${GALAXY_DIR}/.venv/bin/activate
  - pip install mock
  - pip install pytest
  - export PYTHONPATH=${PLAYBOOK_DIR}/env/common/files/galaxy/dynamic_rules/lib/
  - cd ${PLAYBOOK_DIR}/env/common/files/galaxy/dynamic_rules/test/unit/
  - pytest -s
notifications:
  email: false
